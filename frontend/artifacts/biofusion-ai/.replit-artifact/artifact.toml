kind = "web"
previewPath = "/"
title = "BioFusion AI"
version = "1.0.0"
id = "artifacts/biofusion-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20948

[services.development]
run = "pnpm --filter @workspace/biofusion-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/biofusion-ai", "run", "build" ]
publicDir = "artifacts/biofusion-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20948"
BASE_PATH = "/"
